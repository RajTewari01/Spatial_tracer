<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Tracking Engine — Air Gesture Demo</title>
    <meta name="description" content="Real-time hand gesture tracking with MediaPipe and Three.js particle visualization">
    <link rel="stylesheet" href="/static/style.css">

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <!-- MediaPipe JS -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.min.js" crossorigin="anonymous"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ── Three.js Canvas ──────────────────────────────────── -->
    <div id="canvas-container"></div>

    <!-- ── Camera Feed ──────────────────────────────────────── -->
    <div id="camera-panel">
        <div class="camera-header">
            <span class="cam-icon">📷</span>
            <span>Camera Feed</span>
            <button id="btn-toggle-cam" class="btn-icon" onclick="toggleCameraSize()">⛶</button>
        </div>
        <div class="camera-body">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="hand-overlay"></canvas>
        </div>
    </div>

    <!-- ── Top Bar ──────────────────────────────────────────── -->
    <header id="top-bar">
        <div class="logo">
            <span class="logo-icon">🖐️</span>
            <span class="logo-text">Vision Tracker</span>
        </div>
        <div class="status-group">
            <div id="connection-indicator" class="indicator disconnected">
                <span class="dot"></span>
                <span id="connection-text">Camera Off</span>
            </div>
            <div class="fps-display">
                <span id="fps-value">0</span> FPS
            </div>
            <div class="hands-display">
                <span id="hands-value">0</span> ✋
            </div>
        </div>
    </header>

    <!-- ── Info Panel ───────────────────────────────────────── -->
    <aside id="info-panel">
        <div class="panel-section">
            <h3>Active Gestures</h3>
            <div id="gesture-display" class="gesture-badge-container">
                <span class="gesture-placeholder">Waiting for hands...</span>
            </div>
        </div>

        <div class="panel-section">
            <h3>Finger Status</h3>
            <div id="finger-status" class="finger-grid">
                <span class="finger" id="f-thumb">👍 —</span>
                <span class="finger" id="f-index">☝️ —</span>
                <span class="finger" id="f-middle">🖕 —</span>
                <span class="finger" id="f-ring">💍 —</span>
                <span class="finger" id="f-pinky">🤙 —</span>
            </div>
        </div>

        <div class="panel-section">
            <h3>Recent Events</h3>
            <div id="event-log" class="event-log"></div>
        </div>

        <div class="panel-section controls">
            <h3>Controls</h3>
            <button id="btn-start" class="btn btn-primary" onclick="startCamera()">
                🎥 Start Camera
            </button>
            <button id="btn-stop" class="btn btn-secondary" onclick="stopCamera()">
                ⏹ Stop
            </button>
        </div>
    </aside>

    <!-- ── Gesture Flash ────────────────────────────────────── -->
    <div id="gesture-flash" class="gesture-flash hidden"></div>

    <script src="/static/app.js"></script>
</body>
</html>
