<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial_Tracer — Air Gesture Engine</title>
    <meta name="description" content="Real-time hand gesture tracking with MediaPipe and Three.js — by Biswadeep Tewari">
    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.min.js" crossorigin="anonymous"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Three.js -->
    <div id="canvas-container"></div>

    <!-- Camera PiP -->
    <div id="camera-panel">
        <div class="camera-header">
            <span class="cam-dot"></span>
            <span>CAMERA</span>
            <button id="btn-toggle-cam" class="btn-icon" onclick="toggleCameraSize()">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 4V1h3M8 1h3v3M11 8v3H8M4 11H1V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </div>
        <div class="camera-body">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="hand-overlay"></canvas>
        </div>
    </div>

    <!-- Top Bar -->
    <header id="top-bar">
        <div class="logo">
            <div class="logo-mark">S_T</div>
            <div class="logo-typewriter">
                <span id="typewriter-text" class="typewriter"></span>
                <span class="cursor-blink">|</span>
            </div>
        </div>
        <div class="status-group">
            <div id="connection-indicator" class="indicator disconnected">
                <span class="dot"></span>
                <span id="connection-text">Offline</span>
            </div>
            <div class="stat-pill">
                <span id="fps-value">0</span>
                <span class="stat-label">FPS</span>
            </div>
            <div class="stat-pill">
                <span id="hands-value">0</span>
                <span class="stat-label">HANDS</span>
            </div>
        </div>
    </header>

    <!-- Right Panel -->
    <aside id="info-panel">
        <!-- About Section -->
        <div class="panel-section about-section">
            <h3>Creator</h3>
            <div class="about-card">
                <div class="about-name">Biswadeep Tewari</div>
                <div class="about-handle">@RajTewari01</div>
                <div class="about-bio" id="about-bio"></div>
                <div class="about-links">
                    <a href="https://github.com/RajTewari01" target="_blank" class="about-link">GitHub</a>
                </div>
            </div>
        </div>

        <!-- Gesture Detection -->
        <div class="panel-section">
            <h3>Detected Gesture</h3>
            <div id="gesture-display" class="gesture-display">
                <span class="gesture-placeholder">No hands in frame</span>
            </div>
        </div>

        <!-- Finger State -->
        <div class="panel-section">
            <h3>Finger State</h3>
            <div id="finger-status" class="finger-grid">
                <span class="finger" id="f-thumb">THM &mdash;</span>
                <span class="finger" id="f-index">IDX &mdash;</span>
                <span class="finger" id="f-middle">MID &mdash;</span>
                <span class="finger" id="f-ring">RNG &mdash;</span>
                <span class="finger" id="f-pinky">PNK &mdash;</span>
            </div>
        </div>

        <!-- Event Log -->
        <div class="panel-section">
            <h3>Event Log</h3>
            <div id="event-log" class="event-log"></div>
        </div>

        <!-- Controls -->
        <div class="panel-section controls">
            <h3>Controls</h3>
            <button id="btn-start" class="btn btn-primary" onclick="startCamera()">
                Start Camera
            </button>
            <button id="btn-stop" class="btn btn-secondary" onclick="stopCamera()">
                Stop
            </button>
        </div>
    </aside>

    <!-- Gesture Flash (typewriter) -->
    <div id="gesture-flash" class="gesture-flash hidden"></div>

    <script src="/static/app.js"></script>
</body>
</html>
