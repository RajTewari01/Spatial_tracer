name: Python Engine CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'engine/**'
      - 'api/**'
      - 'desktop-client/**'
      - 'main.py'
      - 'requirements.txt'
      - '.github/workflows/python-engine.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'engine/**'
      - 'api/**'
      - 'desktop-client/**'
      - 'main.py'
      - 'requirements.txt'
      - '.github/workflows/python-engine.yml'

jobs:
  lint:
    name: Syntax & Style Lint
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Lint — fatal errors
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=mobile-client,web-client,wiki,vision_tracker,venv,.venv,env,Lib,Scripts

    - name: Lint — style warnings
      run: |
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=mobile-client,web-client,wiki,vision_tracker,venv,.venv,env,Lib,Scripts

  validate:
    name: Import & Structure Validation
    runs-on: windows-latest
    needs: lint

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Validate engine package imports
      run: |
        python -c "from engine import HeadlessHandTracker, GestureDetector; print('[OK] engine/ imports OK')"
        python -c "from engine.air_input_driver import AirInputDriver; print('[OK] AirInputDriver import OK')"
        python -c "from engine.simple_hand_tracer import InitializeCamera; print('[OK] simple_hand_tracer import OK')"

    - name: Validate API imports
      run: |
        python -c "from api.fastapi_main import app; print('[OK] FastAPI app import OK')"
        python -c "from api.input_controller import InputController; print('[OK] InputController import OK')"

    - name: Validate CLI entry point
      run: |
        python main.py --help

    - name: Verify config files
      shell: python
      run: |
        from pathlib import Path
        import json
        import urllib.request

        # mapping.json is tracked in git
        mapping = Path('config/hand_landmarker.task')
        mapping_json = Path('config/mapping.json')

        # Model is gitignored (7.8MB) - download from Google CDN to validate
        if not mapping.exists():
            print('[INFO] hand_landmarker.task not in repo (gitignored) - downloading from Google CDN...')
            url = 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task'
            urllib.request.urlretrieve(url, str(mapping))
            print(f'[OK] Downloaded: {mapping.stat().st_size:,} bytes')

        assert mapping.exists(), 'hand_landmarker.task missing after download!'
        assert mapping.stat().st_size > 1_000_000, 'Model file too small - likely corrupted'

        assert mapping_json.exists(), 'mapping.json missing!'
        data = json.loads(mapping_json.read_text())
        assert 'keys' in data, 'mapping.json missing keys array'
        key_count = len(data['keys'])
        model_size = mapping.stat().st_size
        assert key_count >= 60, f'Expected 60+ keys, got {key_count}'
        print(f'[OK] Config OK - model: {model_size:,} bytes, keyboard: {key_count} keys')
