name: Python Engine CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'engine/**'
      - 'api/**'
      - 'desktop-client/**'
      - 'main.py'
      - 'requirement.txt'
      - '.github/workflows/python-engine.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'engine/**'
      - 'api/**'
      - 'desktop-client/**'
      - 'main.py'
      - 'requirement.txt'
      - '.github/workflows/python-engine.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if (Test-Path requirement.txt) { pip install -r requirement.txt }

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=mobile-client,web-client,wiki
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=mobile-client,web-client,wiki
