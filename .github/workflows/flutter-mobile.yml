name: Flutter Mobile CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'mobile-client/**'
      - '.github/workflows/flutter-mobile.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'mobile-client/**'
      - '.github/workflows/flutter-mobile.yml'

jobs:
  analyze:
    name: Dart Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile-client

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Analyze project
      run: flutter analyze --no-fatal-infos --no-fatal-warnings

    - name: Run tests
      run: flutter test || true

    - name: Check outdated dependencies
      run: |
        echo "## Flutter Dependency Status" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        flutter pub outdated >> $GITHUB_STEP_SUMMARY || true
        echo '```' >> $GITHUB_STEP_SUMMARY

  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: ./mobile-client

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Report APK size
      run: |
        APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
        APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
        echo "## Build Artifact" >> $GITHUB_STEP_SUMMARY
        echo "- **APK Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
        echo "- **Path:** \`$APK_PATH\`" >> $GITHUB_STEP_SUMMARY

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: mobile-client/build/app/outputs/flutter-apk/app-release.apk
