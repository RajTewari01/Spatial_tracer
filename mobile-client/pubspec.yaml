name: spatial_tracer_mobile
description: "Spatial_Tracer — Air gesture control for Android"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  google_mlkit_commons: ^0.7.1
  permission_handler: ^11.4.0
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 24
